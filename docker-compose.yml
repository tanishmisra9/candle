services:
  db:
    image: pgvector/pgvector:pg16
    container_name: candle-db
    environment:
      POSTGRES_DB: candle
      POSTGRES_USER: candle
      POSTGRES_PASSWORD: candle
    ports:
      - "5432:5432"
    volumes:
      - candle_postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U candle -d candle"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  candle_postgres_data:
